<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Your Cleaning — iCleanUpYourMess</title>
<style>
  :root {
    --teal: #0d9488;
    --teal-dark: #0f766e;
    --teal-light: #ccfbf1;
    --text: #0f172a;
    --text-secondary: #64748b;
    --border: #e2e8f0;
  }
  * { box-sizing: border-box; margin:0; padding:0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; color: var(--text); background:#f8fafc; line-height:1.5; }
  a { text-decoration:none; color:inherit; }
  header { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid var(--border); background:#fff; }
  .logo { display:flex; align-items:center; gap:8px; font-weight:800; font-size:1.15rem; }
  .back-link { font-size:.9rem; font-weight:600; color:var(--teal-dark); }
  .back-link:hover { color:var(--teal); }
  main { max-width:720px; margin:0 auto; padding:32px 20px 60px; }
  .page-head { text-align:center; margin-bottom:24px; }
  .page-head h1 { font-size:1.6rem; font-weight:800; margin-bottom:8px; }
  .page-head p { color:var(--text-secondary); font-size:.95rem; }
  .booking-card { background:#fff; border:1px solid var(--border); border-radius:16px; overflow:hidden; box-shadow:0 20px 40px -12px rgba(0,0,0,.08); }
  .booking-card iframe { width:100%; min-height:720px; border:none; display:block; }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">✨ iCleanUpYourMess</a>
  <a href="index.html" class="back-link">← Back to home</a>
</header>

<main>
  <div class="page-head">
    <h1>Book your cleaning</h1>
    <p>Pick a date and time that works for you — we'll confirm shortly after.</p>
  </div>
  <div class="booking-card">
    <iframe src="https://api.leadconnectorhq.com/widget/booking/AKfcx9YA7yo1Yhh8Cazj" style="width: 100%;border:none;overflow: hidden;" scrolling="no" id="AKfcx9YA7yo1Yhh8Cazj_1783669576756"></iframe>
  </div>
</main>

<script src="https://link.msgsndr.com/js/form_embed.js" type="text/javascript"></script>

<!--
Dedicated booking page: same GHL "Home Cleaning - Client Booking" calendar
(id AKfcx9YA7yo1Yhh8Cazj) as the landing page's modal, but embedded directly
on a normal, always-visible page instead of inside a display:none modal.
This sidesteps the form_embed.js "stuck hidden" issue entirely, since the
iframe is visible in the DOM from the first paint — no forced-reload
workaround needed here. Not yet linked from anywhere on the site; link a
button/CTA to book.html once ready to point this into the funnel.
-->
</body>
</html>
